{% extends "base.html" %}
{% block title %}CampusFlow | Delete {{ item.title }}{% endblock %}
{% block content %}
<section class="panel delete-panel">
  <h1>Delete Course</h1>
  <p>Are you sure you want to delete <strong>{{ item.title }}</strong>?</p>
  <form method="post" class="actions-row">
    {% csrf_token %}
    <button class="btn danger" type="submit">Yes, Delete</button>
    <a class="btn secondary" href="/courses/{{ item.id }}/">Cancel</a>
  </form>
</section>
{% endblock %}
