{% extends "base.html" %}
{% block title %}CampusFlow | Edit {{ item.title }}{% endblock %}
{% block content %}
<section class="panel form-panel">
  <h1>Edit Course</h1>
  <form method="post" class="form-grid">
    {% csrf_token %}

    <label>Title</label>
    <input type="text" name="title" value="{{ item.title }}" required>

    <label>Description</label>
    <textarea name="description" rows="5" required>{{ item.description }}</textarea>

    <label>Level</label>
    <select name="level">
      <option value="Beginner" {% if item.level == 'Beginner' %}selected{% endif %}>Beginner</option>
      <option value="Intermediate" {% if item.level == 'Intermediate' %}selected{% endif %}>Intermediate</option>
      <option value="Advanced" {% if item.level == 'Advanced' %}selected{% endif %}>Advanced</option>
    </select>

    <label>Price</label>
    <input type="number" step="0.01" name="price" value="{{ item.price }}" required>

    <label class="checkbox-row">
      <input type="checkbox" name="is_published" {% if item.is_published %}checked{% endif %}>
      Published
    </label>

    <div class="actions-row">
      <button class="btn" type="submit">Save Changes</button>
      <a class="btn secondary" href="/courses/{{ item.id }}/">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
